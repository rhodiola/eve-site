<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__META_DESCRIPTION__" />
    <link rel="canonical" href="https://eve.npaso.com__CANONICAL_PATH__" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        body {
            overflow: hidden;
        }

        .wide-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 92px;
            height: 48px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            text-decoration: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition:
                opacity 0.28s ease,
                background-color 0.18s ease,
                transform 0.18s ease,
                box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .wide-back.is-visible {
            opacity: 0.7;
            pointer-events: auto;
        }

        .wide-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .wide-zoom {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .wide-zoom.is-zoomed {
            cursor: grab;
        }

        .wide-zoom.is-dragging {
            cursor: grabbing;
        }

        .wide-zoom__image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <a class="wide-back" href="../" aria-label="cutへ戻る">←</a>

    <main class="wide-zoom" id="wideZoom" aria-label="横画像ビューア">
        <img class="wide-zoom__image" id="wideImage" src="__WIDE_IMAGE_URL__" alt="__IMAGE_ALT__" loading="eager"
            draggable="false" />
    </main>

    <script>
        (() => {
            const container = document.getElementById("wideZoom");
            const image = document.getElementById("wideImage");

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOriginX = 0;
            let dragOriginY = 0;

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function applyTransform() {
                image.style.transform =
                    `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;

                container.classList.toggle("is-zoomed", scale > 1);
            }

            function resetView() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                applyTransform();
            }

            function zoomAt(clientX, clientY, nextScale) {
                const rect = container.getBoundingClientRect();
                const cx = clientX - rect.left - rect.width / 2;
                const cy = clientY - rect.top - rect.height / 2;

                const prevScale = scale;
                scale = clamp(nextScale, MIN_SCALE, MAX_SCALE);

                if (scale === prevScale) {
                    return;
                }

                const ratio = scale / prevScale;
                translateX = cx - (cx - translateX) * ratio;
                translateY = cy - (cy - translateY) * ratio;

                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                }

                applyTransform();
            }

            container.addEventListener("wheel", (event) => {
                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                zoomAt(event.clientX, event.clientY, scale + delta);
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                const key = event.key;

                if (key === "+" || key === "=") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    window.location.href = "../";
                }
            });

            container.addEventListener("pointerdown", (event) => {
                if (scale <= 1) {
                    return;
                }

                isDragging = true;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
                dragOriginX = translateX;
                dragOriginY = translateY;
                container.classList.add("is-dragging");
                container.setPointerCapture(event.pointerId);
            });

            container.addEventListener("pointermove", (event) => {
                if (!isDragging) {
                    return;
                }

                translateX = dragOriginX + (event.clientX - dragStartX);
                translateY = dragOriginY + (event.clientY - dragStartY);
                applyTransform();
            });

            function endDrag(event) {
                if (!isDragging) {
                    return;
                }

                isDragging = false;
                container.classList.remove("is-dragging");

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) { }
            }

            container.addEventListener("pointerup", endDrag);
            container.addEventListener("pointercancel", endDrag);

            container.addEventListener("dblclick", (event) => {
                if (scale > 1) {
                    resetView();
                } else {
                    zoomAt(event.clientX, event.clientY, 2);
                }
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", resetView, { once: true });
            }

            window.addEventListener("resize", resetView);
        })();
    </script>

    <script>
        (() => {
            const backButton = document.querySelector(".wide-back");
            let hideTimer = null;

            function showBackButton() {
                if (!backButton) {
                    return;
                }

                backButton.classList.add("is-visible");

                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    backButton.classList.remove("is-visible");
                }, 1200);
            }

            ["mousemove", "mousedown", "touchstart", "keydown", "wheel"].forEach((eventName) => {
                window.addEventListener(eventName, showBackButton, { passive: true });
            });

            showBackButton();
        })();
    </script>
</body>

</html>
