<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__META_DESCRIPTION__" />
    <meta name="robots" content="noindex,follow" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Inter, "Noto Sans JP", system-ui, -apple-system, sans-serif;
        }

        body {
            overflow: hidden;
        }

        a,
        button {
            color: inherit;
            text-decoration: none;
            font: inherit;
        }

        .viewer-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: rgba(255, 255, 255, 0.96);
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition:
                opacity 0.28s ease,
                background-color 0.18s ease,
                transform 0.18s ease,
                box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back.is-visible {
            opacity: 0.86;
            pointer-events: auto;
        }

        .viewer-back.is-dimmed {
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .viewer-meta-row {
            position: fixed;
            top: 16px;
            left: 96px;
            right: 16px;
            z-index: 29;
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            transition: opacity 0.28s ease, transform 0.28s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-meta-row.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .viewer-meta-row.is-dimmed {
            opacity: 0;
            transform: translateY(-2px);
        }

        .viewer-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.01em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            transition:
                opacity 0.28s ease,
                background-color 0.18s ease,
                transform 0.18s ease,
                box-shadow 0.18s ease;
        }

        .viewer-chip--size {
            cursor: default;
            pointer-events: none;
        }

        .viewer-chip--download {
            cursor: pointer;
            pointer-events: auto;
        }

        .viewer-chip--download:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
        }

        .viewer-chip--download.is-busy {
            opacity: 0.72;
            cursor: progress;
        }

        .viewer-stage {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .viewer-stage.is-zoomed {
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        @media (max-width: 640px) {
            .viewer-back {
                min-width: 60px;
                min-height: 40px;
                font-size: 14px;
                top: 12px;
                left: 12px;
            }

            .viewer-meta-row {
                top: 12px;
                left: 82px;
                right: 12px;
                gap: 8px;
            }

            .viewer-chip {
                min-height: 40px;
                padding: 0 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <a class="viewer-back is-visible" href="../" aria-label="Back">←</a>

    <div class="viewer-meta-row is-visible" id="viewerMetaRow" aria-live="polite">
        <div id="viewerActions" style="display:flex; gap:10px; flex-wrap:wrap; pointer-events:auto;"><a id="pixDownloadLink" class="viewer-chip viewer-chip--download" href="https://pix.npaso.com/" rel="noopener">pixでダウンロード</a></div>
    </div>

    <main class="viewer-stage" id="viewerStage" aria-label="Full image viewer">
        <img class="viewer-image" id="viewerImage" src="__FULL_IMAGE_URL__" alt="__IMAGE_ALT__" loading="eager"
            draggable="false" />
    </main>

    <script>
        (() => {
            const container = document.getElementById("viewerStage");
            const image = document.getElementById("viewerImage");
            const backButton = document.querySelector(".viewer-back");
            const metaRow = document.getElementById("viewerMetaRow");
            const actionsContainer = document.getElementById("viewerActions");

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;
            const OVERLAY_HIDE_DELAY = 2200;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOriginX = 0;
            let dragOriginY = 0;
            let hideTimer = null;
            let isDownloading = false;
function buildPixUrlFromViewer() {
    const viewerUrl = image.currentSrc || image.src || "";
    if (!viewerUrl) {
        return "https://pix.npaso.com/";
    }

    try {
        const parsed = new URL(viewerUrl, location.href);
        const file = (parsed.pathname.split("/").pop() || "").trim();
        const id = file.replace(/\.webp$/i, "");
        if (!id) {
            return "https://pix.npaso.com/";
        }
        return `https://pix.npaso.com/items/${encodeURIComponent(id)}/`;
    } catch (_) {
        return "https://pix.npaso.com/";
    }
}

function renderPixLink() {
    const link = document.getElementById("pixDownloadLink");
    if (!link) {
        return;
    }
    link.href = buildPixUrlFromViewer();
}

                button.classList.add("is-busy");
                showOverlay();

                try {
                    const response = await fetch(url, {
                        method: "GET",
                        mode: "cors",
                        credentials: "omit",
                        cache: "no-store",
                        redirect: "follow"
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    if (!blob || blob.size === 0) {
                        throw new Error("Empty response body (blob size = 0).");
                    }

                    const objectUrl = URL.createObjectURL(blob);

                    try {
                        const link = document.createElement("a");
                        link.href = objectUrl;
                        link.download = filename || "image.webp";
                        link.rel = "noopener";
                        link.style.display = "none";
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => link.remove(), 2000);
                    } finally {
                        setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);
                    }
                } catch (error) {
                    console.error("Download failed:", url, error);
                    alert("Download failed. Check console/network.");
                } finally {
                    isDownloading = false;
                    button.classList.remove("is-busy");
                    showOverlay();
                }
            }

            container.addEventListener("wheel", (event) => {
                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                zoomAt(event.clientX, event.clientY, scale + delta);
                showOverlay();
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                const key = event.key;

                if (key === "+" || key === "=") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    window.location.href = "../";
                }

                showOverlay();
            });

            container.addEventListener("pointerdown", (event) => {
                if (scale <= 1) {
                    showOverlay();
                    return;
                }

                isDragging = true;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
                dragOriginX = translateX;
                dragOriginY = translateY;
                container.classList.add("is-dragging");
                container.setPointerCapture(event.pointerId);
                showOverlay();
            });

            container.addEventListener("pointermove", (event) => {
                if (!isDragging) {
                    return;
                }

                translateX = dragOriginX + (event.clientX - dragStartX);
                translateY = dragOriginY + (event.clientY - dragStartY);
                applyTransform();
            });

            function endDrag(event) {
                if (!isDragging) {
                    return;
                }

                isDragging = false;
                container.classList.remove("is-dragging");

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) {
                }

                showOverlay();
            }

            container.addEventListener("pointerup", endDrag);
            container.addEventListener("pointercancel", endDrag);

            container.addEventListener("dblclick", (event) => {
                if (scale > 1) {
                    resetView();
                } else {
                    zoomAt(event.clientX, event.clientY, 2);
                }

                showOverlay();
            });

            ["mousemove", "mousedown", "touchstart", "keydown", "wheel", "click"].forEach((eventName) => {
                window.addEventListener(eventName, showOverlay, { passive: true });
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", () => {
                    resetView();
                }, { once: true });
            }

            window.addEventListener("resize", () => {
                resetView();
                showOverlay();
            });
            renderPixLink();
            showOverlay();
        })();
    </script>
</body>

</html>
