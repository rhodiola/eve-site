<!DOCTYPE html>
<html lang="ja" style="background:#000;">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>__PAGE_TITLE__</title>
    <meta name="description" content="__META_DESCRIPTION__" />
    <meta name="robots" content="noindex,follow" />

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Inter, "Noto Sans JP", system-ui, -apple-system, sans-serif;
        }

        body {
            overflow: hidden;
        }

        a,
        button {
            color: inherit;
            text-decoration: none;
            font: inherit;
        }

        .viewer-back {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 68px;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: rgba(255, 255, 255, 0.96);
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.42);
            transition:
                opacity 0.28s ease,
                background-color 0.18s ease,
                transform 0.18s ease,
                box-shadow 0.18s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back.is-visible {
            opacity: 0.86;
            pointer-events: auto;
        }

        .viewer-back.is-dimmed {
            opacity: 0;
            pointer-events: none;
        }

        .viewer-back:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
        }

        .viewer-meta-row {
            position: fixed;
            top: 16px;
            left: 96px;
            right: 16px;
            z-index: 29;
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            align-items: center;
            flex-wrap: wrap;
            transition: opacity 0.28s ease, transform 0.28s ease;
            opacity: 0;
            pointer-events: none;
        }

        .viewer-meta-row.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .viewer-meta-row.is-dimmed {
            opacity: 0;
            transform: translateY(-2px);
        }

        .viewer-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: rgba(255, 255, 255, 0.92);
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0.01em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
            transition:
                opacity 0.28s ease,
                background-color 0.18s ease,
                transform 0.18s ease,
                box-shadow 0.18s ease;
        }

        .viewer-chip--size {
            cursor: default;
            pointer-events: none;
        }

        .viewer-chip--download {
            cursor: pointer;
            pointer-events: auto;
        }

        .viewer-chip--download:hover {
            background: rgba(0, 0, 0, 0.84);
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
        }

        .viewer-chip--download.is-busy {
            opacity: 0.72;
            cursor: progress;
        }

        .viewer-stage {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            touch-action: none;
            user-select: none;
            cursor: default;
        }

        .viewer-stage.is-zoomed {
            cursor: grab;
        }

        .viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            transform-origin: center center;
            transform: translate3d(0px, 0px, 0) scale(1);
            will-change: transform;
            user-select: none;
            -webkit-user-drag: none;
        }

        @media (max-width: 640px) {
            .viewer-back {
                min-width: 60px;
                min-height: 40px;
                font-size: 14px;
                top: 12px;
                left: 12px;
            }

            .viewer-meta-row {
                top: 12px;
                left: 82px;
                right: 12px;
                gap: 8px;
            }

            .viewer-chip {
                min-height: 40px;
                padding: 0 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <a class="viewer-back" href="../" aria-label="Back">←</a>

    <div class="viewer-meta-row" id="viewerMetaRow" aria-live="polite">
        <div id="viewerActions" style="display:flex; gap:10px; flex-wrap:wrap; pointer-events:none;"></div>
    </div>

    <main class="viewer-stage" id="viewerStage" aria-label="Full image viewer">
        <img class="viewer-image" id="viewerImage" src="__FULL_IMAGE_URL__" alt="__IMAGE_ALT__" loading="eager"
            draggable="false" />
    </main>

    <script>
        (() => {
            const container = document.getElementById("viewerStage");
            const image = document.getElementById("viewerImage");
            const backButton = document.querySelector(".viewer-back");
            const metaRow = document.getElementById("viewerMetaRow");
            const actionsContainer = document.getElementById("viewerActions");

            let scale = 1;
            let translateX = 0;
            let translateY = 0;

            const MIN_SCALE = 1;
            const MAX_SCALE = 6;
            const SCALE_STEP = 0.2;
            const OVERLAY_HIDE_DELAY = 2200;

            let isDragging = false;
            let dragStartX = 0;
            let dragStartY = 0;
            let dragOriginX = 0;
            let dragOriginY = 0;
            let hideTimer = null;
            let isDownloading = false;

            function isTemplateToken(value) {
                return typeof value === "string" && /^__.+__$/.test(value);
            }

            function getDownloadSources() {
                const viewerUrl = image.currentSrc || image.src || "";

                if (!viewerUrl) {
                    return [];
                }

                let filename = "__DOWNLOAD_IMAGE_FILENAME__";

                try {
                    const parsedUrl = new URL(viewerUrl, location.href);
                    const pathnameParts = parsedUrl.pathname.split("/");
                    filename = pathnameParts[pathnameParts.length - 1] || filename;
                } catch (_) {
                }

                const createVariantUrl = (folderName) => {
                    try {
                        const parsedUrl = new URL(viewerUrl, location.href);

                        if (/\/full\//.test(parsedUrl.pathname)) {
                            parsedUrl.pathname = parsedUrl.pathname.replace(/\/full\//, `/${folderName}/`);
                        } else if (/\/viewer\//.test(parsedUrl.pathname)) {
                            parsedUrl.pathname = parsedUrl.pathname.replace(/\/viewer\//, `/${folderName}/`);
                        } else {
                            return "";
                        }

                        return parsedUrl.toString();
                    } catch (_) {
                        return "";
                    }
                };

                const derivedSources = [
                    {
                        key: "download",
                        url: createVariantUrl("download"),
                        filename
                    },
                    {
                        key: "download2",
                        url: createVariantUrl("download2"),
                        filename
                    }
                ].filter((source) => source.url);

                if (derivedSources.length) {
                    return derivedSources;
                }

                return [
                    {
                        key: "download",
                        url: isTemplateToken("__DOWNLOAD_IMAGE_URL__") ? "" : "__DOWNLOAD_IMAGE_URL__",
                        filename: isTemplateToken("__DOWNLOAD_IMAGE_FILENAME__") ? filename : "__DOWNLOAD_IMAGE_FILENAME__"
                    },
                    {
                        key: "download2",
                        url: isTemplateToken("__DOWNLOAD2_IMAGE_URL__") ? "" : "__DOWNLOAD2_IMAGE_URL__",
                        filename: isTemplateToken("__DOWNLOAD2_IMAGE_FILENAME__") ? filename : "__DOWNLOAD2_IMAGE_FILENAME__"
                    }
                ].filter((source) => source.url);
            }

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function applyTransform() {
                image.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
                container.classList.toggle("is-zoomed", scale > 1);
            }

            function resetView() {
                scale = 1;
                translateX = 0;
                translateY = 0;
                applyTransform();
            }

            function zoomAt(clientX, clientY, nextScale) {
                const rect = container.getBoundingClientRect();
                const cx = clientX - rect.left - rect.width / 2;
                const cy = clientY - rect.top - rect.height / 2;

                const prevScale = scale;
                scale = clamp(nextScale, MIN_SCALE, MAX_SCALE);

                if (scale === prevScale) {
                    return;
                }

                const ratio = scale / prevScale;
                translateX = cx - (cx - translateX) * ratio;
                translateY = cy - (cy - translateY) * ratio;

                if (scale === 1) {
                    translateX = 0;
                    translateY = 0;
                }

                applyTransform();
            }

            function showOverlay() {
                if (backButton) {
                    backButton.classList.add("is-visible");
                    backButton.classList.remove("is-dimmed");
                }

                if (metaRow) {
                    metaRow.classList.add("is-visible");
                    metaRow.classList.remove("is-dimmed");
                }

                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    if (backButton) {
                        backButton.classList.remove("is-visible");
                        backButton.classList.add("is-dimmed");
                    }

                    if (metaRow) {
                        metaRow.classList.remove("is-visible");
                        metaRow.classList.add("is-dimmed");
                    }
                }, OVERLAY_HIDE_DELAY);
            }

            function createDownloadButton(source, width, height) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "viewer-chip viewer-chip--download";
                button.dataset.downloadUrl = source.url;
                button.dataset.downloadFilename = source.filename || "";
                button.textContent = `${width}×${height} DL`;
                button.setAttribute("aria-label", `${width}×${height} DL`);
                button.addEventListener("click", async (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    await downloadCurrentImage(button);
                });
                return button;
            }

            function probeDownloadSource(source) {
                return new Promise((resolve) => {
                    const probe = new Image();

                    probe.onload = () => {
                        resolve({
                            source,
                            width: probe.naturalWidth || 0,
                            height: probe.naturalHeight || 0
                        });
                    };

                    probe.onerror = () => resolve(null);
                    probe.src = `${source.url}${source.url.includes("?") ? "&" : "?"}v=${Date.now()}`;
                });
            }

            async function renderDownloadButtons() {
                if (!actionsContainer) {
                    return;
                }

                actionsContainer.replaceChildren();

                const downloadSources = getDownloadSources();
                const results = await Promise.all(downloadSources.map((source) => probeDownloadSource(source)));
                const availableSources = results.filter((result) => result && result.width > 0 && result.height > 0);

                availableSources.forEach((entry) => {
                    actionsContainer.appendChild(
                        createDownloadButton(entry.source, entry.width, entry.height)
                    );
                });
            }

            async function downloadCurrentImage(button) {
                if (!button || isDownloading) {
                    return;
                }

                const url = button.dataset.downloadUrl;
                const filename = button.dataset.downloadFilename || "__DOWNLOAD_IMAGE_FILENAME__" || "image.webp";

                if (!url) {
                    return;
                }

                isDownloading = true;
                button.classList.add("is-busy");
                showOverlay();

                try {
                    const response = await fetch(url, {
                        method: "GET",
                        mode: "cors",
                        credentials: "omit",
                        cache: "no-store",
                        redirect: "follow"
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);

                    try {
                        const link = document.createElement("a");
                        link.href = objectUrl;
                        link.download = filename;
                        link.rel = "noopener";
                        link.style.display = "none";
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                    } finally {
                        setTimeout(() => {
                            URL.revokeObjectURL(objectUrl);
                        }, 1500);
                    }
                } catch (_) {
                } finally {
                    isDownloading = false;
                    button.classList.remove("is-busy");
                    showOverlay();
                }
            }

            container.addEventListener("wheel", (event) => {
                event.preventDefault();
                const delta = event.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
                zoomAt(event.clientX, event.clientY, scale + delta);
                showOverlay();
            }, { passive: false });

            window.addEventListener("keydown", (event) => {
                const key = event.key;

                if (key === "+" || key === "=") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale + SCALE_STEP);
                } else if (key === "-") {
                    event.preventDefault();
                    zoomAt(window.innerWidth / 2, window.innerHeight / 2, scale - SCALE_STEP);
                } else if (key === "0") {
                    event.preventDefault();
                    resetView();
                } else if (key === "Escape") {
                    event.preventDefault();
                    window.location.href = "../";
                }

                showOverlay();
            });

            container.addEventListener("pointerdown", (event) => {
                if (scale <= 1) {
                    showOverlay();
                    return;
                }

                isDragging = true;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
                dragOriginX = translateX;
                dragOriginY = translateY;
                container.classList.add("is-dragging");
                container.setPointerCapture(event.pointerId);
                showOverlay();
            });

            container.addEventListener("pointermove", (event) => {
                if (!isDragging) {
                    return;
                }

                translateX = dragOriginX + (event.clientX - dragStartX);
                translateY = dragOriginY + (event.clientY - dragStartY);
                applyTransform();
            });

            function endDrag(event) {
                if (!isDragging) {
                    return;
                }

                isDragging = false;
                container.classList.remove("is-dragging");

                try {
                    container.releasePointerCapture(event.pointerId);
                } catch (_) {
                }

                showOverlay();
            }

            container.addEventListener("pointerup", endDrag);
            container.addEventListener("pointercancel", endDrag);

            container.addEventListener("dblclick", (event) => {
                if (scale > 1) {
                    resetView();
                } else {
                    zoomAt(event.clientX, event.clientY, 2);
                }

                showOverlay();
            });

            ["mousemove", "mousedown", "touchstart", "keydown", "wheel", "click"].forEach((eventName) => {
                window.addEventListener(eventName, showOverlay, { passive: true });
            });

            if (image.complete) {
                resetView();
            } else {
                image.addEventListener("load", () => {
                    resetView();
                }, { once: true });
            }

            window.addEventListener("resize", () => {
                resetView();
                showOverlay();
            });

            renderDownloadButtons();
            showOverlay();
        })();
    </script>
</body>

</html>
